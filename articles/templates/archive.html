<!DOCTYPE html>
<html>
<head>
    <title>Архив статей</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
</head>
<body class="archive">
    <div class="header">
        <img src="{% static 'img/logo.jpg' %}" alt="Логотип" />
        <div class="nav-links">
        {% if user.is_authenticated %}
            <a href="{% url 'create_post' %}" class="new-post-link">Новая статья</a>
        {% else %}
            <a href="/admin/login/?next={% url 'create_post' %}" class="new-post-link">Войдите, чтобы писать</a>
        {% endif %}
        </div>
    </div>
    <div class="archive">
        {% for post in posts %}
            <div class="one-post">
                <h2 class="post-title">
                    <a href="{% url 'get_article' article_id=post.id %}">{{ post.title }}</a>
                </h2>
                <div class="article-info">
                    <div class="article-author">{{ post.author.username }}</div>
                    <div class="article-created-date">{{ post.created_date }}</div>
                </div>
                <p class="article-text">{{ post.get_excerpt }}</p>
            </div>
        {% endfor %}
    </div>
</body>
</html>
