<!DOCTYPE html>
<html>
<head>
    <title>{{ post.title }}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
</head>
<body class="article">
    <div class="header">
        <img src="{% static 'img/logo.jpg' %}" alt="Логотип" />
        <div class="user-panel">
        {% if user.is_authenticated %}
            Привет, {{ user.username }}! |
            <a href="{% url 'logout' %}">Выйти</a>
        {% else %}
            <a href="{% url 'login' %}">Войти</a> |
            <a href="{% url 'register' %}">Регистрация</a>
        {% endif %}
        </div>
    </div>
    <div class="article">
        <div class="one-post">
            <h1 class="post-title">{{ post.title }}</h1>
            <div class="article-info">
                <div class="article-author">{{ post.author.username }}</div>
                <div class="article-created-date">{{ post.created_date }}</div>
            </div>
            <p class="article-text">{{ post.text }}</p>
        </div>
        <div class="back-link">
            <a href="{% url 'archive' %}">Все записи</a>
        </div>
    </div>
</body>
</html>
