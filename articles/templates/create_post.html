<!DOCTYPE html>
<html>
<head>
    <title>Новая статья</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
</head>
<body class="create-post">
    <div class="header">
        <img src="{% static 'img/logo.png' %}" alt="Логотип" />
    </div>
    <div class="content">
        <h1>Написать новую статью</h1>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="title">Название статьи:</label>
                <input type="text" name="title" id="title"
                       value="{{ title|default:'' }}"
                       placeholder="Введите заголовок">
            </div>
            <div class="form-group">
                <label for="text">Текст статьи:</label>
                <textarea name="text" id="text" rows="10"
                          placeholder="Введите текст">{{ text|default:'' }}</textarea>
            </div>
            <button type="submit">Сохранить</button>
        </form>
        {% if errors %}
            <div class="errors">
                <ul>
                {% for error in errors %}
                    <li>{{ error }}</li>
                {% endfor %}
                </ul>
            </div>
        {% endif %}
        <div class="back-link">
            <a href="{% url 'archive' %}">Вернуться к списку статей</a>
        </div>
    </div>
</body>
</html>
